<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        /* ATS Multicolor Fade */
        #ats-text {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 56px;
            font-weight: 900;
            z-index: 2;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            background: linear-gradient(90deg, 
                #ff0000 0%, 
                #ff7f00 16%, 
                #ffff00 33%, 
                #00ff00 50%, 
                #0000ff 66%, 
                #4b0082 83%, 
                #ff0000 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 7s ease infinite;
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% center;
            }
            50% {
                background-position: 100% center;
            }
            100% {
                background-position: 0% center;
            }
        }

        /* Search Bar */
        #search-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        #search-bar {
            width: 400px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            outline: none;
            transition: box-shadow 0.3s;
        }

        #search-bar:focus {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        #search-bar::placeholder {
            color: #999;
        }

        #shortcuts {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 1;
        }

        .shortcut {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .shortcut:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.3);
        }

        .shortcut img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }

        #clock {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            font-size: 36px;
            font-family: 'Roboto Mono', monospace;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <video id="background" autoplay loop muted playsinline>
        <source src="CustomWallpaperGoesHere.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- ATS Multicolor Text at Top Right -->
    <div id="ats-text">ATS</div>

    <!-- Shortcuts -->
    <div id="shortcuts">
        <a href="https://www.google.com" class="shortcut" target="_blank">
            <img src="https://www.google.com/favicon.ico" alt="Google">
        </a>
        <a href="https://www.youtube.com" class="shortcut" target="_blank">
            <img src="https://blog.youtube/static/blog_youtube/images/youtube_social_200x200.png" alt="YouTube">
        </a>
        <a href="https://www.github.com" class="shortcut" target="_blank">
            <img src="https://github.githubassets.com/favicons/favicon.png" alt="GitHub">
        </a>
        <a href="https://www.reddit.com" class="shortcut" target="_blank">
            <img src="https://www.redditstatic.com/desktop2x/img/favicon/android-icon-192x192.png" alt="Reddit">
        </a>
    </div>

    <!-- Search Bar -->
    <div id="search-container">
        <input type="text" id="search-bar" placeholder="Rechercher avec Google...">
    </div>

    <!-- Clock -->
    <div id="clock">--:--</div>

    <!-- Link to External JavaScript -->
    <script src="clock.js"></script>
    <script src="typing-animation.js"></script>
</body>
</html>
